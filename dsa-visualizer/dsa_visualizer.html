<!DOCTYPE html>
<html lang="en">
<!-- 
  Algorithm Visualizer
  By Issam Soubra
  
  I made this to help me (and maybe others) actually see how 
  sorting works. It's way easier than just reading code.
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Algo Visualizer</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 90%;
        }
        h1 {
            margin-top: 0;
            font-weight: 800;
            letter-spacing: -0.025em;
        }
        #box {
            display: flex;
            align-items: flex-end;
            height: 250px;
            gap: 4px;
            padding: 1rem;
            background: #0f172a;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
        }
        .bar {
            flex: 1;
            background: #38bdf8;
            border-radius: 2px 2px 0 0;
            transition: height 0.2s ease, background 0.2s;
        }
        .btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        .reset-btn {
            background: #64748b;
        }
        .reset-btn:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sorting Visualizer</h1>
        <p>Watch the bars move as the algorithm sorts them!</p>
        
        <div id="box"></div>
        
        <div class="btns">
            <button id="go" onclick="startSort()">Start Sorting</button>
            <button class="reset-btn" onclick="shuffle()">New Data</button>
        </div>
    </div>

    <script>
        let vals = [];
        const box = document.getElementById('box');
        const goBtn = document.getElementById('go');

        function draw(highlight = []) {
            box.innerHTML = '';
            vals.forEach((v, idx) => {
                const b = document.createElement('div');
                b.className = 'bar';
                b.style.height = `${v}%`;
                if (highlight.includes(idx)) {
                    b.style.background = '#f43f5e';
                }
                box.appendChild(b);
            });
        }

        function shuffle() {
            vals = Array.from({length: 20}, () => Math.floor(Math.random() * 90) + 5);
            draw();
            goBtn.disabled = false;
        }

        async function startSort() {
            goBtn.disabled = true;
            let n = vals.length;
            
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    draw([j, j + 1]);
                    await new Promise(r => setTimeout(r, 50));
                    
                    if (vals[j] > vals[j + 1]) {
                        let tmp = vals[j];
                        vals[j] = vals[j + 1];
                        vals[j + 1] = tmp;
                    }
                }
            }
            draw();
            goBtn.disabled = false;
        }

        // Initial setup
        shuffle();
    </script>
</body>
</html>
