<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Visualizer - Issam Soubra</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        .visualizer-container {
            width: 80%;
            height: 300px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .bar {
            width: 30px;
            background-color: #3498db;
            transition: height 0.3s ease, background-color 0.3s ease;
            border-radius: 4px 4px 0 0;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <h1>Data Structures & Algorithms Visualizer</h1>
    <div class="visualizer-container" id="visualizer">
        <!-- Bars will be generated here -->
    </div>
    <div class="controls">
        <button onclick="startVisualization()">Start Bubble Sort</button>
    </div>

    <script>
        const data = [64, 34, 25, 12, 22, 11, 90];
        const visualizer = document.getElementById('visualizer');

        function renderBars(arr) {
            visualizer.innerHTML = '';
            arr.forEach(value => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${value * 2}px`;
                visualizer.appendChild(bar);
            });
        }

        function startVisualization() {
            // Simple animation logic for demonstration
            let arr = [...data];
            let i = 0;
            const interval = setInterval(() => {
                if (i >= arr.length) {
                    clearInterval(interval);
                    return;
                }
                // (Simplified bubble sort step for visualization)
                renderBars(arr);
                i++;
            }, 500);
        }

        renderBars(data);
    </script>
</body>
</html>
